<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>929-ALERTS!</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-red: #ff3333;
            --dark-bg: #0a0a0a;
            --card-bg: rgba(255, 255, 255, 0.05);
            --accent-green: #00ff41;
            /* ADJUST LOGO SIZE HERE */
            --logo-size: 400px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Montserrat', sans-serif;
        }

        body {
            background: radial-gradient(circle at center, #1a0000 0%, #050505 100%);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* WATERMARK */
        body::before {
            content: "";
            position: fixed;
            top: 50%;
            left: 50%;
            width: var(--logo-size);
            height: var(--logo-size);
            background: url('929.png.png') no-repeat center;
            background-size: contain;
            opacity: 0.05;
            transform: translate(-50%, -50%);
            z-index: -1;
        }

        /* HEADER SECTION */
        header {
            text-align: center;
            padding: 12px 10px;
            background: rgba(0, 0, 0, 0.6);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .headline {
            font-size: 26px;
            font-weight: 800;
            letter-spacing: 1px;
            color: var(--primary-red);
            text-transform: uppercase;
        }

        .sub-headline {
            font-size: 11px;
            font-weight: 400;
            color: #888;
            margin-top: 2px;
        }

        /* MAIN LAYOUT */
        .main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
            padding: 10px;
            gap: 5px;
        }

        /* TIME SECTION */
        .time-box {
            background: rgba(255, 255, 255, 0.03);
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        #clock { font-size: 38px; font-weight: 800; line-height: 1; color: #fff; }
        #date { font-size: 13px; color: #aaa; margin-top: 4px; }
        .pst-label { font-size: 9px; color: var(--primary-red); font-weight: bold; letter-spacing: 2px; margin-bottom: 2px; }

        /* ACTIVE DISPATCH HEADER */
        .section-header-container {
            margin-top: 5px;
            padding: 0 5px;
        }

        .section-header {
            font-size: 15px;
            font-weight: 800;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .refresh-note {
            font-size: 10px;
            color: #666;
            font-style: italic;
            margin-top: 2px;
        }

        /* SCROLL AREA */
        .scroll-area {
            flex: 1;
            overflow-y: auto;
            max-height: 60vh;
            padding: 5px;
            margin-top: 5px;
        }

        /* ALERT CARD */
        .alert-card {
            background: var(--card-bg);
            border-left: 4px solid var(--primary-red);
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .alert-type-label {
            display: block;
            font-weight: 800;
            font-size: 14px;
            color: var(--primary-red);
            text-transform: uppercase;
        }

        .alert-info p { font-size: 12px; color: #ccc; margin: 1px 0; }
        .alert-info b { color: #fff; font-size: 11px; }

        .btn-view {
            padding: 6px 12px;
            background: #fff;
            color: #000;
            border: none;
            border-radius: 4px;
            font-weight: 800;
            font-size: 10px;
            cursor: pointer;
        }

        /* REFRESH FOOTER */
        .footer-refresh-info {
            padding: 15px;
            text-align: center;
            font-size: 11px;
            color: #555;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .last-refresh-time {
            color: var(--accent-green);
            font-weight: bold;
        }

        /* MODAL */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0; top: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-content {
            background: #111;
            width: 100%;
            max-width: 450px;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--primary-red);
        }

        /* MODAL BUTTONS */
        .modal-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 20px;
        }

        .btn-modal {
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            font-size: 12px;
            cursor: pointer;
            text-transform: uppercase;
        }

        .btn-copy { background: #333; color: #fff; }
        .btn-share { background: var(--primary-red); color: #fff; }
        .btn-close { 
            grid-column: span 2; 
            background: #222; 
            color: #fff; 
            margin-top: 5px;
        }

        /* RESPONSIVENESS */
        @media (min-width: 769px) {
            .main-container { flex-direction: row; flex-wrap: wrap; padding: 20px; }
            .time-box { flex: 0 0 300px; height: fit-content; }
            .alerts-container-wrapper { flex: 1; }
            .scroll-area { max-height: 75vh; }
        }

        @media (max-width: 480px) {
            #clock { font-size: 32px; }
            .headline { font-size: 22px; }
        }

        .status-dot {
            height: 8px; width: 8px;
            background-color: var(--accent-green);
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 8px var(--accent-green);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body>

    <header>
        <div class="headline">929-ALERTS!</div>
        <div class="sub-headline">929 FIRE & RESCUE VOLUNTEER - RADIO COMMUNICATION ORGANIZATION</div>
    </header>

    <div class="main-container">
        <div class="time-box">
            <div class="pst-label">PHILIPPINE STANDARD TIME</div>
            <div id="clock">00:00:00</div>
            <div id="date">Loading...</div>
        </div>

        <div class="alerts-container-wrapper" style="flex: 1; width: 100%;">
            <div class="section-header-container">
                <div class="section-header">
                    <span class="status-dot"></span> ACTIVE DISPATCH ALERTS:
                </div>
                <div class="refresh-note">
                    Automatically refresh in 1 minutes to stay active.
                </div>
            </div>

            <div class="scroll-area" id="alertsContainer"></div>
        </div>
    </div>

    <div class="footer-refresh-info">
        Source: Data Server Feed (@drin_wx) | facebook.com/929volunteers <br>
        Data As of: <span id="lastRefresh" class="last-refresh-time">--:--:--</span>
    </div>

    <div class="modal" id="detailsModal">
        <div class="modal-content">
            <h3 style="color: var(--primary-red); margin-bottom: 15px; font-size: 18px;">ALERT DETAILS:</h3>
            <div id="modalDetails" style="font-size: 13px; line-height: 1.6; color: #ddd;"></div>
            
            <div class="modal-actions">
                <button class="btn-modal btn-copy" id="copyBtn">COPY</button>
                <button class="btn-modal btn-share" id="shareBtn">SHARE</button>
                <button class="btn-modal btn-close" onclick="closeModal()">CLOSE</button>
            </div>
        </div>
    </div>

    <script>
        let currentAlertData = null; // Para sa share/copy reference

        function updateClock() {
            const now = new Date();
            document.getElementById("clock").innerText = now.toLocaleTimeString("en-PH", { hour12: true });
            document.getElementById("date").innerText = now.toLocaleDateString("en-PH", { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
        }
        setInterval(updateClock, 1000);
        updateClock();

        const API_URL = "https://929-alerts.github.io/data/aip.json";
        const REFRESH_RATE = 1 * 60 * 1000;

        async function fetchAlerts() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                renderAlerts(data.fire_alerts);
                const now = new Date();
                document.getElementById("lastRefresh").innerText = now.toLocaleTimeString("en-PH", { hour12: true });
            } catch (err) {
                console.error("Data Fetch Error:", err);
            }
        }

        function renderAlerts(alerts) {
            const container = document.getElementById("alertsContainer");
            container.innerHTML = "";
            alerts.forEach(alert => {
                const card = document.createElement("div");
                card.className = "alert-card";
                card.innerHTML = `
                    <div class="alert-info">
                        <span class="alert-type-label">${alert.alert_type}</span>
                        <p><b>LOC:</b> ${alert.location}</p>
                        <p><b>INVOLVED:</b> ${alert.involved}</p>
                        <p><b>STATUS:</b> ${alert.status}</p>
                    </div>
                    <div style="text-align:right">
                        <button class="btn-view" onclick='openModal(${JSON.stringify(alert)})'>DETAILS</button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function openModal(alert) {
            currentAlertData = alert; // I-save ang data
            document.getElementById("modalDetails").innerHTML = `
                <p><b>ALERT CODE:</b> ${alert.alert_code}</p>
                <p><b>TYPE:</b> <span style="color:var(--primary-red)">${alert.alert_type}</span></p>
                <p><b>LOCATION:</b> ${alert.location}</p>
                <p><b>INVOLVED:</b> ${alert.involved}</p>
                <p><b>STATUS:</b> ${alert.status}</p>
                <p><b>TIMESTAMP:</b> ${alert.date_time}</p>
                <p style="margin-top:10px; border-top: 1px solid #333; padding-top:5px;"><b>NOTES:</b> ${alert.notes || 'None'}</p>
            `;
            document.getElementById("detailsModal").style.display = "flex";
        }

        function closeModal() { 
            document.getElementById("detailsModal").style.display = "none"; 
        }

        // FORMAT TEXT FOR COPY/SHARE
        function getFormattedText() {
            if(!currentAlertData) return "";
            return `🚨929-ALERTS! \n\n` +
                   `TYPE: ${currentAlertData.alert_type}\n` +
                   `LOC: ${currentAlertData.location}\n` +
                   `INVOLVED: ${currentAlertData.involved}\n` +
                   `STATUS: ${currentAlertData.status}\n` +
                   `TIME: ${currentAlertData.date_time}\n\n` +
                   `Source: https://929-fire.github.io/org.ph/\n` ;
        }

        // COPY FUNCTION
        document.getElementById("copyBtn").onclick = async () => {
            const text = getFormattedText();
            try {
                await navigator.clipboard.writeText(text);
                alert("Alert details copied to clipboard!");
            } catch (err) {
                console.error("Failed to copy!", err);
            }
        };

        // SHARE FUNCTION
        document.getElementById("shareBtn").onclick = async () => {
            const text = getFormattedText();
            if (navigator.share) {
                try {
                    await navigator.share({
                        title: '929 Dispatch Alert',
                        text: text
                    });
                } catch (err) {
                    console.log("Share cancelled or failed");
                }
            } else {
                alert("Web Share not supported in this browser. Please use Copy button instead.");
            }
        };

        fetchAlerts();
        setInterval(fetchAlerts, REFRESH_RATE);
    </script>
</body>
</html>
